manifest:
  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect

  projects:
    - name: nrf
      remote: ncs
      repo-path: sdk-nrf
      revision: v3.3.0
      import:
        name-allowlist:
          - cmsis
          - cmsis_6
          - hal_nordic
          - mbedtls
          - mcuboot
          - nrf_wifi
          - nrfxlib
          - oberon-psa-crypto
          - qcbor
          - trusted-firmware-m
          - zcbor
          - zephyr
          - cmock
          # nRF53 only (multicore):
          - libmetal
          - open-amp

  self:
    path: sidewalk
