supported_file_extensions:
- .*\.py$
- .*\.c$
- .*\.h$
- .*CMakeLists.txt$
- .*\.conf$
- .*\.sh$
- .*git_hooks/.*
- .*\.overlay$

ignore_license_in_files:
- doc/.*
- build.*
- \.github
- \.devcontainer
- \.git/
- __pycache__
- __init__.py
- version.conf$
- twister-out.*
- utils/nanopb/include.*
- sidewalk.*/subsys/semtech/lbm_port/config/app_subghz_config.h
- sidewalk.*/subsys/semtech/smtc_lbm/.*CMakeLists.txt$

license_header_size: 30

licenses:
- copyright_regexp: Copyright \(c\) \d{4} Nordic Semiconductor ASA
  file_regexp:
  - sidewalk.*/subsys/semtech/CMakeLists.txt
  - sidewalk.*/subsys/semtech/lbm_v1-3-1.cmake
  - sidewalk.*/subsys/semtech/lr1110_location/lr11xx_radio_scan.c$
  - sidewalk.*/subsys/semtech/lr1110/include/lr1110_location_bridge.h$
  - sidewalk.*/subsys/semtech/lr11xx/CMakeLists.txt$
  - sidewalk.*/subsys/semtech/lr1110_location/CMakeLists.txt$
  - sidewalk.*/subsys/sal/common/CMakeLists.txt$
  search_license_txt: null
  spdx: LicenseRef-Nordic-5-Clause

