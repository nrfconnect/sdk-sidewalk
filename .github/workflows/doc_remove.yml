name: Documentation Remove

permissions:
  contents: read

on:
  pull_request_target:
    types: [closed]
    branches:
      - main
      - 'v*-branch'

jobs:
  remove:
    runs-on: ubuntu-24.04
    steps:
      - name: Try removal of PR-docs
        env:
          AZCOPY_CONCURRENCY_VALUE: 3000
        run: |
          azcopy rm "${{ vars.NCS_DOC_PR_STORAGE_URL }}addons/addon-sidewalk/PR-${{ github.event.number }}?${{ secrets.NCS_DOC_SAS_PRS }}" --recursive=true || true
