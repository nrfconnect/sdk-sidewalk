CONFIG_STATIC_INIT_GNU=y

# Sidewalk platform (radio PAL only, no DFU/bootloader)
CONFIG_SIDEWALK=y
CONFIG_SIDEWALK_DFU=n

# Log
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BUFFER_SIZE=2048

# Stack and Heap
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Power Management
CONFIG_PM_DEVICE=y

# Debug
CONFIG_NCS_APPLICATION_BOOT_BANNER_STRING="LR11xx FW update"
CONFIG_RESET_ON_FATAL_ERROR=n
